<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento · Ryane dsgn.</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,800;0,900;1,700;1,900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #1a1a1a;
    --purple: #b97cff;
    --purple-dark: #9b5de5;
    --purple-light: #d4a8ff;
    --yellow: #f9f169;
    --yellow-dark: #f5e94a;
    --white: #ffffff;
    --gray: #2e2e2e;
    --gray2: #3d3d3d;
    --muted: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* Glow blobs */
  body::before {
    content: '';
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(185,124,255,0.12) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    pointer-events: none;
    z-index: 0;
  }

  .blob2 {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(249,241,105,0.07) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 56px 28px 80px;
    position: relative;
    z-index: 1;
  }

  /* ─── HEADER ─── */
  .header {
    margin-bottom: 52px;
    animation: fadeUp 0.7s ease both;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .logo-circle {
    width: 52px;
    height: 52px;
    background: var(--black);
    border: 2.5px solid var(--gray2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* 4-point star SVG inline */
  .star-icon { width: 22px; height: 22px; }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .logo-top {
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    color: var(--white);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .logo-bottom {
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    color: var(--purple);
    letter-spacing: -0.02em;
  }

  .logo-dot { color: var(--yellow); }

  .header-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gray);
    border: 1px solid var(--gray2);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .tag-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--purple);
    animation: blink 2s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .header-title {
    font-weight: 900;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    line-height: 1.05;
    letter-spacing: -0.03em;
  }

  .header-title .client {
    color: var(--purple);
    font-style: italic;
    display: block;
  }

  .header-title .spark {
    display: inline-block;
    color: var(--yellow);
    font-size: 0.7em;
    vertical-align: top;
    margin-left: 6px;
    animation: spinStar 4s linear infinite;
  }

  @keyframes spinStar {
    0%,100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.2); }
  }

  /* ─── INFO CARDS ─── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 48px;
    animation: fadeUp 0.7s 0.1s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .info-card {
    background: var(--gray);
    border: 1.5px solid var(--gray2);
    border-radius: 16px;
    padding: 22px 20px;
    transition: border-color 0.25s, transform 0.25s;
    position: relative;
    overflow: hidden;
  }

  .info-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
    background: var(--gray2);
    transition: background 0.3s;
  }

  .info-card:hover {
    border-color: var(--purple);
    transform: translateY(-3px);
  }

  .info-card:hover::before { background: var(--purple); }

  .info-card.yellow-accent:hover { border-color: var(--yellow); }
  .info-card.yellow-accent:hover::before { background: var(--yellow); }

  .info-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .info-value {
    font-weight: 800;
    font-size: 1.2rem;
    color: var(--white);
    line-height: 1.3;
  }

  .info-value input {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    color: var(--white);
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
    border-bottom: 1.5px dashed rgba(185,124,255,0.4);
    padding-bottom: 2px;
    transition: border-color 0.2s;
    cursor: pointer;
  }

  .info-value input:focus { border-color: var(--purple); }

  .info-value input[readonly] {
    cursor: default;
    border-bottom: none;
    color: var(--purple);
  }

  .info-value.yellow-val input[readonly] { color: var(--yellow); }

  .info-hint {
    font-family: 'Space Mono', monospace;
    font-size: 8.5px;
    color: var(--purple);
    opacity: 0.7;
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  .info-hint.yellow { color: var(--yellow); }

  /* ─── PROGRESS ─── */
  .progress-wrap {
    margin-bottom: 44px;
    animation: fadeUp 0.7s 0.18s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 14px;
  }

  .progress-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .progress-num {
    font-weight: 900;
    font-size: 3rem;
    line-height: 1;
    color: var(--purple);
    letter-spacing: -0.04em;
  }

  .progress-num span {
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--purple-light);
    vertical-align: super;
  }

  .progress-track {
    height: 8px;
    background: var(--gray);
    border-radius: 100px;
    overflow: visible;
    position: relative;
    border: 1.5px solid var(--gray2);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--purple-dark), var(--purple), var(--yellow));
    border-radius: 100px;
    transition: width 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    box-shadow: 0 0 12px rgba(185,124,255,0.5);
  }

  .progress-fill::after {
    content: '✦';
    position: absolute;
    right: -8px;
    top: -10px;
    font-size: 18px;
    color: var(--yellow);
    filter: drop-shadow(0 0 6px rgba(249,241,105,0.7));
    animation: floatStar 2s ease infinite;
  }

  @keyframes floatStar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* ─── SECTION TITLE ─── */
  .section-title {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    animation: fadeUp 0.7s 0.22s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .section-title-text {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .section-line {
    flex: 1;
    height: 1.5px;
    background: var(--gray2);
    border-radius: 4px;
  }

  .section-bolt {
    font-size: 14px;
    color: var(--purple);
  }

  /* ─── PHASES ─── */
  .phases-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .phase {
    background: var(--gray);
    border: 1.5px solid var(--gray2);
    border-radius: 16px;
    padding: 20px 22px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 16px;
    align-items: center;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
    opacity: 0;
    animation: fadeUp 0.5s ease both;
    animation-fill-mode: forwards;
  }

  .phase:hover {
    transform: translateX(5px);
    border-color: var(--gray);
    background: #333;
  }

  .phase.done {
    border-color: rgba(185,124,255,0.3);
    background: rgba(185,124,255,0.07);
  }

  .phase.done:hover { border-color: var(--purple); }

  .phase.active {
    border-color: var(--purple);
    background: rgba(185,124,255,0.1);
    box-shadow: 0 0 0 1px rgba(185,124,255,0.15), 0 8px 32px rgba(185,124,255,0.12);
  }

  .phase.active:hover {
    transform: translateX(5px);
    box-shadow: 0 0 0 1px rgba(185,124,255,0.3), 0 12px 40px rgba(185,124,255,0.18);
  }

  /* Left stripe */
  .phase::before {
    content: '';
    position: absolute;
    left: 0; top: 12px; bottom: 12px;
    width: 4px;
    border-radius: 0 4px 4px 0;
    background: var(--gray2);
    transition: background 0.3s;
  }

  .phase.done::before { background: var(--purple-dark); }
  .phase.active::before { background: var(--purple); box-shadow: 0 0 8px rgba(185,124,255,0.6); }

  /* Step icon */
  .phase-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
    background: var(--gray2);
    border: 1.5px solid #444;
    transition: all 0.3s;
  }

  .phase.done .phase-icon {
    background: rgba(185,124,255,0.15);
    border-color: rgba(185,124,255,0.4);
  }

  .phase.active .phase-icon {
    background: rgba(185,124,255,0.2);
    border-color: var(--purple);
    box-shadow: 0 0 12px rgba(185,124,255,0.3);
    animation: iconPulse 2.5s ease infinite;
  }

  @keyframes iconPulse {
    0%,100% { box-shadow: 0 0 12px rgba(185,124,255,0.3); }
    50% { box-shadow: 0 0 20px rgba(185,124,255,0.6); }
  }

  .phase-content { flex: 1; }

  .phase-num {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }

  .phase-title {
    font-weight: 800;
    font-size: 1.05rem;
    margin-bottom: 4px;
    color: var(--white);
    transition: color 0.3s;
  }

  .phase.active .phase-title { color: var(--purple-light); }
  .phase.done .phase-title { color: var(--white); opacity: 0.85; }

  .phase-desc {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
    line-height: 1.5;
  }

  /* Badge */
  .phase-badge {
    font-family: 'Space Mono', monospace;
    font-size: 8.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 5px 11px;
    border-radius: 100px;
    flex-shrink: 0;
    align-self: flex-start;
  }

  .badge-done {
    background: rgba(185,124,255,0.15);
    color: var(--purple-light);
    border: 1px solid rgba(185,124,255,0.3);
  }

  .badge-active {
    background: rgba(185,124,255,0.2);
    color: var(--purple);
    border: 1px solid var(--purple);
    animation: badgeGlow 2s ease infinite;
  }

  @keyframes badgeGlow {
    0%,100% { box-shadow: none; }
    50% { box-shadow: 0 0 10px rgba(185,124,255,0.4); }
  }

  .badge-pending {
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    border: 1px solid #444;
  }

  /* Check icon for done */
  .check-mark {
    color: var(--purple);
    font-size: 18px;
    align-self: flex-start;
    margin-top: 2px;
    flex-shrink: 0;
  }

  /* ─── FOOTER ─── */
  .footer {
    margin-top: 64px;
    padding-top: 28px;
    border-top: 1.5px solid var(--gray2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.7s 0.5s ease both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .footer-logo {
    font-weight: 900;
    font-size: 1rem;
    color: var(--purple);
  }

  .footer-logo span { color: var(--yellow); }

  .footer-note {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: right;
    opacity: 0.7;
  }

  /* ─── CONFIG BUTTON ─── */
  .config-toggle {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--purple);
    color: var(--black);
    border: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 12px 20px;
    border-radius: 100px;
    cursor: pointer;
    z-index: 100;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(185,124,255,0.4);
  }

  .config-toggle:hover {
    background: var(--yellow);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(249,241,105,0.35);
  }

  /* ─── CONFIG PANEL ─── */
  .config-panel {
    position: fixed;
    bottom: 80px;
    right: 28px;
    background: #222;
    border: 1.5px solid var(--gray2);
    border-radius: 20px;
    padding: 28px;
    width: 300px;
    z-index: 99;
    display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(185,124,255,0.1);
  }

  .config-panel.open { display: block; animation: slideUp 0.3s ease; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .config-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 22px;
  }

  .config-title {
    font-weight: 900;
    font-size: 1rem;
    color: var(--white);
  }

  .config-title-spark { color: var(--yellow); }

  .config-field { margin-bottom: 14px; }

  .config-field label {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .config-field input,
  .config-field select {
    width: 100%;
    background: var(--gray);
    border: 1.5px solid var(--gray2);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-field input:focus,
  .config-field select:focus { border-color: var(--purple); }

  .config-field select option { background: #222; }

  .config-apply {
    width: 100%;
    background: var(--purple);
    color: var(--black);
    border: none;
    border-radius: 100px;
    font-family: 'Poppins', sans-serif;
    font-weight: 900;
    font-size: 13px;
    padding: 13px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }

  .config-apply:hover {
    background: var(--yellow);
    transform: scale(1.02);
    box-shadow: 0 4px 16px rgba(249,241,105,0.3);
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .container { padding: 36px 16px 60px; }
    .info-grid { grid-template-columns: 1fr; }
    .footer { flex-direction: column; gap: 14px; text-align: center; }
    .config-panel { right: 12px; left: 12px; width: auto; }
    .config-toggle { right: 16px; bottom: 18px; }
  }
</style>
</head>
<body>
<div class="blob2"></div>

<div class="container">

  <!-- Header -->
  <header class="header">
    <div class="logo-area">
      <div class="logo-circle">
        <svg class="star-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C12 2 13 8 18 9C13 10 12 22 12 22C12 22 11 10 6 9C11 8 12 2 12 2Z" fill="#b97cff"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-top">Ryane</span>
        <span class="logo-bottom">dsgn<span class="logo-dot">.</span></span>
      </div>
    </div>

    <div class="header-tag">
      <span class="tag-dot"></span>
      Acompanhamento de projeto
    </div>

    <h1 class="header-title">
      Projeto
      <span class="client" id="clientNameDisplay">Nome do Cliente<span class="spark">✦</span></span>
    </h1>
  </header>

  <!-- Info Cards -->
  <div class="info-grid">
    <div class="info-card">
      <p class="info-label">Contrato assinado</p>
      <div class="info-value">
        <input type="date" id="contractDate" onchange="updateDates()">
      </div>
      <p class="info-hint">← clique para editar</p>
    </div>
    <div class="info-card">
      <p class="info-label">Prazo de entrega</p>
      <div class="info-value yellow-val">
        <input type="text" id="deadlineDisplay" readonly value="—">
      </div>
      <p class="info-hint yellow" id="workdaysNote">30 dias úteis</p>
    </div>
    <div class="info-card yellow-accent">
      <p class="info-label">Valor pendente</p>
      <div class="info-value">
        <input type="text" id="pendingValue" value="R$ 0,00" onblur="formatCurrency(this)">
      </div>
      <p class="info-hint">← clique para editar</p>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label">Progresso geral do projeto</span>
      <span class="progress-num"><span id="progressPct">0</span><span>%</span></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Phases -->
  <div class="section-title">
    <span class="section-bolt">⚡</span>
    <span class="section-title-text">Etapas do projeto</span>
    <div class="section-line"></div>
  </div>

  <div class="phases-list" id="phasesList"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-brand">
      <span class="footer-logo">ryane dsgn<span>.</span></span>
    </div>
    <p class="footer-note" id="footerNote">Página exclusiva de acompanhamento</p>
  </footer>

</div>

<!-- Config -->
<button class="config-toggle" onclick="toggleConfig()">✦ Configurar</button>

<div class="config-panel" id="configPanel">
  <div class="config-header">
    <span style="font-size:20px">⚡</span>
    <h3 class="config-title">Personalizar <span class="config-title-spark">✦</span></h3>
  </div>

  <div class="config-field">
    <label>Nome do cliente</label>
    <input type="text" id="cfgClient" placeholder="ex: Bella Flor">
  </div>

  <div class="config-field">
    <label>Etapa atual</label>
    <select id="cfgPhase">
      <option value="0">01 — Briefing</option>
      <option value="1">02 — Pesquisas e Referências</option>
      <option value="2">03 — Paleta de Cores</option>
      <option value="3">04 — Logotipo + Tipografia</option>
      <option value="4">05 — Aprovação</option>
      <option value="5">06 — Fechamento de Arquivos</option>
      <option value="6">07 — Entrega Final ✦</option>
    </select>
  </div>

  <button class="config-apply" onclick="applyConfig()">Aplicar ✦</button>
</div>

<script>
  const phaseData = [
    { icon: "📋", title: "Briefing", desc: "Alinhamento de expectativas, objetivos da marca, público-alvo e direcionamento criativo." },
    { icon: "🔍", title: "Pesquisas e Referências", desc: "Curadoria de referências visuais, análise de concorrência e mapeamento de tendências." },
    { icon: "🎨", title: "Paleta de Cores", desc: "Definição das cores que traduzem a essência e a personalidade única da sua marca." },
    { icon: "✏️", title: "Logotipo + Tipografia", desc: "Desenvolvimento do símbolo, logotipo e escolha tipográfica que compõem a identidade." },
    { icon: "✅", title: "Aprovação", desc: "Apresentação das propostas, feedback e refinamentos finais com você." },
    { icon: "📁", title: "Fechamento de Arquivos", desc: "Organização e preparação de todos os arquivos nos formatos adequados para uso." },
    { icon: "🎁", title: "Entrega Final", desc: "Entrega do manual de identidade visual e todos os arquivos da sua marca." },
  ];

  let currentPhase = 0;

  function renderPhases() {
    const list = document.getElementById('phasesList');
    list.innerHTML = '';

    phaseData.forEach((p, i) => {
      const status = i < currentPhase ? 'done' : i === currentPhase ? 'active' : 'pending';

      const badge = status === 'done'
        ? `<span class="phase-badge badge-done">Concluído</span>`
        : status === 'active'
        ? `<span class="phase-badge badge-active">Em andamento</span>`
        : `<span class="phase-badge badge-pending">Aguardando</span>`;

      const delay = 0.28 + i * 0.06;

      list.innerHTML += `
        <div class="phase ${status}" style="animation-delay:${delay}s">
          <div class="phase-icon">${p.icon}</div>
          <div class="phase-content">
            <p class="phase-num">Etapa ${String(i+1).padStart(2,'0')}</p>
            <h3 class="phase-title">${p.title}</h3>
            <p class="phase-desc">${p.desc}</p>
          </div>
          ${badge}
        </div>
      `;
    });

    const pct = currentPhase >= phaseData.length ? 100 : Math.round((currentPhase / phaseData.length) * 100);
    document.getElementById('progressPct').textContent = pct;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  function addWorkdays(date, n) {
    let d = new Date(date), c = 0;
    while (c < n) {
      d.setDate(d.getDate() + 1);
      if (d.getDay() !== 0 && d.getDay() !== 6) c++;
    }
    return d;
  }

  function updateDates() {
    const v = document.getElementById('contractDate').value;
    if (!v) return;
    const deadline = addWorkdays(new Date(v + 'T12:00:00'), 30);
    document.getElementById('deadlineDisplay').value = deadline.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
    document.getElementById('workdaysNote').textContent = '30 dias úteis a partir da assinatura';
  }

  function formatCurrency(el) {
    const num = parseFloat(el.value.replace(/[^\d,]/g,'').replace(',','.'));
    if (!isNaN(num)) el.value = num.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
  }

  function toggleConfig() {
    document.getElementById('configPanel').classList.toggle('open');
  }

  function applyConfig() {
    const client = document.getElementById('cfgClient').value.trim();
    currentPhase = parseInt(document.getElementById('cfgPhase').value);
    if (client) {
      document.getElementById('clientNameDisplay').innerHTML = client + '<span class="spark">✦</span>';
    }
    renderPhases();
    document.getElementById('configPanel').classList.remove('open');
  }

  renderPhases();
</script>
</body>
</html>
